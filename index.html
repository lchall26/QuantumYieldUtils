<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quantum Yield Calculator</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Plotly for graphs -->
  <script src="https://cdn.plot.ly/plotly-3.4.0.min.js" charset="utf-8"></script>

  <!-- SheetJS for reading Excel files in the browser -->
  <script type="text/javascript" src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <header class="hero">
    <h1>Quantum Yield Calculator</h1>
    <p>Browser-based absorbance, LED, and photon analysis tool</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>1. Upload Input Files</h2>

      <label>
        Absorbance Excel File
        <input type="file" id="absFile" accept=".xls,.xlsx" />
      </label>

      <label>
        LED Emission Excel File
        <input type="file" id="ledFile" accept=".xls,.xlsx" />
      </label>
    </section>

    <section class="card">
      <h2>2. Absorbance Inputs</h2>

      <label>
        Original Pathlength L1 (cm)
        <input type="number" id="l1" value="1.0" step="0.01" />
      </label>

      <label>
        Original Concentration C1 (mol/L)
        <input type="number" id="c1" value="1.0" step="0.001" />
      </label>

      <label>
        FTIR Pathlength L2 (cm)
        <input type="number" id="l2" value="1.0" step="0.01" />
      </label>

      <label>
        FTIR Concentration C2 (mol/L)
        <input type="number" id="c2" value="1.0" step="0.001" />
      </label>
    </section>

    <section class="card">
      <h2>3. LED and Kinetics Inputs</h2>

      <label>
        LED Intensity (mW/cm²)
        <input type="number" id="intensity" value="1.0" step="0.1" />
      </label>

      <label>
        FTIR Conversion Fraction Rate (fraction/s)
        <input type="number" id="rateFTIR" value="0.0001" step="0.0001" />
      </label>

      <label>
        Monomer Concentration (mol/L)
        <input type="number" id="monomerConc" value="0.01" step="0.001" />
      </label>

      <label>
        Number of Gaussian Components
        <input type="number" id="nGaussians" value="2" min="1" max="5" step="1" />
      </label>
    </section>

    <section class="card actions">
      <h2>4. Run Analysis</h2>
      <button id="runBtn">Run Calculation</button>
      <p id="status" class="status">Waiting for files and inputs.</p>
    </section>

    <section class="card">
      <h2>Results Summary</h2>
      <div id="results"></div>
    </section>

    <section class="card">
  <h2>Plots</h2>
  <div id="plotExtinction" class="plot"></div>
  <div id="plotLEDGaussian" class="plot"></div>
  <div id="plotOverlap" class="plot"></div>
  <div id="plotPhotonsEmitted" class="plot"></div>
  <div id="plotFractionAbsorbed" class="plot"></div>
  <div id="plotPhotonsAbsorbed" class="plot"></div>
</section>
  </main>

  <script type="module" src="script.js?v=10"></script>
</body>
</html>
